<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldLabs Viewer Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h2>WorldLabs Viewer Lab (No Login)</h2>
        <div class="row">
          <label for="api-key">WLT API Key</label>
          <input id="api-key" type="password" placeholder="Paste WLT-Api-Key here" />
          <button id="list-worlds">List Worlds</button>
        </div>
        <div class="row">
          <label for="list-source">List Source</label>
          <select id="list-source">
            <option value="official">Official (public)</option>
            <option value="owned">API Key (owned)</option>
          </select>
          <span class="muted">official uses api.worldlabs.ai/api/v1</span>
        </div>
        <div class="row">
          <label for="world-id">World ID</label>
          <input id="world-id" type="text" value="889a5974-c395-4a6a-a401-e2d6aec4f12b" />
          <button id="open-world">Open World</button>
        </div>
        <div class="row">
          <label for="quality">Quality</label>
          <select id="quality">
            <option value="full_res">full_res</option>
            <option value="500k">500k</option>
            <option value="100k">100k</option>
          </select>
          <span id="status"></span>
        </div>
        <div class="row">
          <label for="list-status">List Status</label>
          <select id="list-status">
            <option value="">ALL</option>
            <option value="SUCCEEDED">SUCCEEDED</option>
            <option value="RUNNING">RUNNING</option>
            <option value="PENDING">PENDING</option>
            <option value="FAILED">FAILED</option>
          </select>
          <label for="list-model">Model</label>
          <input id="list-model" type="text" placeholder="e.g. marble-1.1 / marble-1.0-draft" />
        </div>
        <div class="row">
          <label for="list-public">Public</label>
          <select id="list-public">
            <option value="">ALL</option>
            <option value="true">Public only</option>
            <option value="false">Private only</option>
          </select>
          <span id="list-debug"></span>
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>world_id</th>
                <th>display_name</th>
                <th>thumbnail</th>
                <th>actions</th>
              </tr>
            </thead>
            <tbody id="worlds-body">
              <tr>
                <td colspan="4">No worlds loaded yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <section id="viewer" class="viewer">
      <div class="viewer-toolbar">
        <button id="close-viewer">Close</button>
        <button id="reset-view">Reset View</button>
        <span id="viewer-status" class="viewer-status">Idle</span>
        <div class="progress"><span id="progress-fill"></span></div>
      </div>
      <canvas id="world-canvas"></canvas>
    </section>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { SparkControls, SparkRenderer, SplatLoader, SplatMesh } from "@sparkjsdev/spark";

      const API_BASE = "https://api.worldlabs.ai/marble/v1";

      const apiKeyEl = document.getElementById("api-key");
      const worldIdEl = document.getElementById("world-id");
      const qualityEl = document.getElementById("quality");
      const listSourceEl = document.getElementById("list-source");
      const listBtn = document.getElementById("list-worlds");
      const openBtn = document.getElementById("open-world");
      const worldsBody = document.getElementById("worlds-body");
      const statusEl = document.getElementById("status");
      const listStatusEl = document.getElementById("list-status");
      const listModelEl = document.getElementById("list-model");
      const listPublicEl = document.getElementById("list-public");
      const listDebugEl = document.getElementById("list-debug");
      const viewer = document.getElementById("viewer");
      const viewerStatus = document.getElementById("viewer-status");
      const progressFill = document.getElementById("progress-fill");
      const closeBtn = document.getElementById("close-viewer");
      const resetBtn = document.getElementById("reset-view");
      const canvas = document.getElementById("world-canvas");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x060910);
      const camera = new THREE.PerspectiveCamera(75, 1, 0.01, 2000);
      scene.add(camera);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      const sparkRenderer = new SparkRenderer({ renderer });
      scene.add(sparkRenderer);
      const controls = new SparkControls({ canvas });
      const loader = new SplatLoader();

      let currentMesh = null;
      let initialPos = new THREE.Vector3(0, 0, 0.01);
      let initialQuat = new THREE.Quaternion();

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setViewerStatus(text) {
        viewerStatus.textContent = text;
      }

      function resize() {
        const w = Math.max(window.innerWidth, 1);
        const h = Math.max(window.innerHeight, 1);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      }

      function setInitialView() {
        camera.position.set(0, 0, 0.01);
        camera.quaternion.set(0, 0, 0, 1);
        initialPos = camera.position.clone();
        initialQuat = camera.quaternion.clone();
      }

      function resetView() {
        camera.position.copy(initialPos);
        camera.quaternion.copy(initialQuat);
        camera.updateProjectionMatrix();
      }

      function clearWorld() {
        if (currentMesh) {
          scene.remove(currentMesh);
          currentMesh.dispose();
          currentMesh = null;
        }
      }

      async function apiFetch(path, options = {}) {
        const key = apiKeyEl.value.trim();
        if (!key) throw new Error("Please paste WLT API key first.");

        const response = await fetch(`${API_BASE}/${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "WLT-Api-Key": key,
            ...(options.headers || {}),
          },
        });
        const body = await response.json();
        if (!response.ok) {
          throw new Error(`${path}: HTTP ${response.status} ${JSON.stringify(body)}`);
        }
        return body;
      }

      async function officialFetch(path, options = {}) {
        const response = await fetch(`https://api.worldlabs.ai/api/v1/${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(`${path}: HTTP ${response.status} ${JSON.stringify(body)}`);
        }
        return body;
      }

      function normalizeWorld(raw) {
        if (!raw || typeof raw !== "object") return null;
        const world = unwrapWorld(raw);
        const worldId = (world.world_id || world.id || "").trim();
        if (!worldId) return null;

        const spzUrls =
          world?.assets?.splats?.spz_urls ||
          world?.generation_output?.spz_urls ||
          {};
        const thumbnail =
          world?.assets?.thumbnail_url ||
          (world?.generation_output?.mpi_url
            ? `${world.generation_output.mpi_url}/thumbnail.webp`
            : "");

        return {
          world_id: worldId,
          display_name: world.display_name || "-",
          world_marble_url:
            world.world_marble_url || `https://marble.worldlabs.ai/world/${worldId}`,
          assets: {
            thumbnail_url: thumbnail || null,
            splats: { spz_urls: spzUrls || {} },
          },
          model: world.model || world?.generation_input?.model || "",
          status: world.status || "",
          source: world.source || "",
        };
      }

      function unwrapWorld(payload) {
        if (!payload || typeof payload !== "object") return null;
        if (payload.world && typeof payload.world === "object") return payload.world;
        return payload;
      }

      function pickSplatUrl(world, quality) {
        const urls = world?.assets?.splats?.spz_urls || {};
        return urls[quality] || urls.full_res || urls["500k"] || urls["100k"] || null;
      }

      async function openWorld(world) {
        clearWorld();
        viewer.classList.add("active");
        setInitialView();
        progressFill.style.width = "0%";

        const quality = qualityEl.value;
        const url = pickSplatUrl(world, quality);
        if (!url) {
          setViewerStatus("No splat URL in world assets");
          return;
        }

        setViewerStatus(`Loading ${quality}...`);
        const packedSplats = await loader.loadAsync(url, (e) => {
          if (!e.lengthComputable) return;
          const ratio = Math.max(0, Math.min(1, e.loaded / e.total));
          progressFill.style.width = `${Math.round(ratio * 100)}%`;
          setViewerStatus(`Loading ${Math.round(ratio * 100)}%`);
        });
        await packedSplats.initialized;

        currentMesh = new SplatMesh({ packedSplats });
        await currentMesh.initialized;
        currentMesh.quaternion.set(1, 0, 0, 0);
        currentMesh.updateGenerator();
        scene.add(currentMesh);

        setViewerStatus(`Ready (${quality})`);
      }

      function makeRow(world) {
        const tr = document.createElement("tr");
        const thumb = world?.assets?.thumbnail_url || "";
        tr.innerHTML = `
          <td>${world.world_id}</td>
          <td>${world.display_name || "-"}</td>
          <td>${thumb ? `<img src="${thumb}" alt="" width="80" />` : "-"}</td>
          <td></td>
        `;
        const btn = document.createElement("button");
        btn.textContent = "View";
        btn.onclick = async () => {
          worldIdEl.value = world.world_id;
          try {
            await loadById(world.world_id);
          } catch (e) {
            setStatus(String(e?.message || e));
            setViewerStatus(String(e?.message || e));
          }
        };
        tr.children[3].appendChild(btn);
        return tr;
      }

      async function listWorlds() {
        setStatus("Listing worlds...");
        listDebugEl.textContent = "";

        const sourceMode = listSourceEl.value;
        const pageSize = 100;
        let pageToken = null;
        const all = [];
        const seen = new Set();
        let pageCount = 0;

        const statusFilter = listStatusEl.value.trim();
        const modelFilter = listModelEl.value.trim();
        const publicRaw = listPublicEl.value.trim();

        if (sourceMode === "official") {
          // 官方 Marble Explore 入口：curated 标签池（公开）
          do {
            const body = await officialFetch("worlds:by-tag", {
              method: "POST",
              body: JSON.stringify({
                tag: "curated",
                page_size: Math.min(pageSize, 50),
                ...(pageToken ? { page_token: pageToken } : {}),
              }),
            });
            pageCount += 1;

            const worlds = Array.isArray(body.worlds) ? body.worlds : [];
            for (const raw of worlds) {
              const world = normalizeWorld(raw);
              const id = world?.world_id;
              if (!id || seen.has(id)) continue;
              seen.add(id);
              all.push(world);
            }

            pageToken =
              typeof body.next_page_token === "string" && body.next_page_token.trim()
                ? body.next_page_token.trim()
                : null;
            // 先取前两页用于快速对比
            if (pageCount >= 2) break;
          } while (pageToken);
        } else {
          // docs.worldlabs.ai /marble/v1/worlds:list：当前 WLT key 的 worlds
          const listRequestBase = {
            page_size: pageSize,
            sort_by: "updated_at",
            ...(statusFilter ? { status: statusFilter } : {}),
            ...(modelFilter ? { model: modelFilter } : {}),
            ...(publicRaw ? { is_public: publicRaw === "true" } : {}),
          };
          do {
            const body = await apiFetch("worlds:list", {
              method: "POST",
              body: JSON.stringify({
                ...listRequestBase,
                ...(pageToken ? { page_token: pageToken } : {}),
              }),
            });
            pageCount += 1;

            const worlds = Array.isArray(body.worlds) ? body.worlds : [];
            for (const raw of worlds) {
              const world = normalizeWorld(raw);
              const id = world?.world_id;
              if (!id || seen.has(id)) continue;
              seen.add(id);
              all.push(world);
            }

            pageToken =
              typeof body.next_page_token === "string" && body.next_page_token.trim()
                ? body.next_page_token.trim()
                : null;
          } while (pageToken);
        }

        worldsBody.innerHTML = "";
        if (!all.length) {
          worldsBody.innerHTML = `<tr><td colspan="4">No worlds returned for this API key.</td></tr>`;
        } else {
          for (const world of all) {
            if (world?.assets) worldsBody.appendChild(makeRow(world));
          }
        }

        const byModel = new Map();
        for (const w of all) {
          const m = (w?.model || "unknown").trim();
          byModel.set(m, (byModel.get(m) || 0) + 1);
        }
        const modelSummary = [...byModel.entries()]
          .sort((a, b) => b[1] - a[1])
          .map(([k, v]) => `${k}:${v}`)
          .join(" | ");

        listDebugEl.textContent = `pages=${pageCount} · unique=${all.length}${modelSummary ? ` · ${modelSummary}` : ""}`;
        setStatus(`Loaded ${all.length} worlds.`);
      }

      async function loadById(worldIdOverride) {
        const id = (worldIdOverride || worldIdEl.value).trim();
        if (!id) throw new Error("world_id is empty");
        const sourceMode = listSourceEl.value;
        setStatus(`Fetching world ${id} from World Labs API...`);
        const worldPayload =
          sourceMode === "official"
            ? await officialFetch(`worlds/${encodeURIComponent(id)}`, { method: "GET" })
            : await apiFetch(`worlds/${encodeURIComponent(id)}`, { method: "GET" });
        const world = normalizeWorld(worldPayload);
        if (!world?.assets?.splats?.spz_urls) {
          throw new Error("world payload missing assets.splats.spz_urls");
        }
        await openWorld(world);
        setStatus(`Opened world ${id}.`);
      }

      listBtn.onclick = async () => {
        try {
          await listWorlds();
        } catch (e) {
          setStatus(String(e?.message || e));
        }
      };

      openBtn.onclick = async () => {
        try {
          await loadById();
        } catch (e) {
          setStatus(String(e?.message || e));
          setViewerStatus(String(e?.message || e));
        }
      };

      closeBtn.onclick = () => {
        viewer.classList.remove("active");
        clearWorld();
        progressFill.style.width = "0%";
        setViewerStatus("Idle");
      };

      resetBtn.onclick = () => resetView();

      window.addEventListener("resize", resize);
      resize();
      setInitialView();

      renderer.setAnimationLoop(() => {
        if (viewer.classList.contains("active")) controls.update(camera);
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
