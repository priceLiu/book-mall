    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #121212;
            color: #fff;
            padding: 25px;
        }

        .container {
            max-width: 1700px;
            margin: 0 auto;
        }

        /* 分类导航 */
        .category-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .category-nav::-webkit-scrollbar { height: 6px; }
        .category-nav::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .category-btn {
            padding: 8px 16px;
            background: #1e1e1e;
            border: none;
            color: #ccc;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #007aff;
            color: #fff;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 12px;
        }

        .card-title {
            font-size: 14px;
            color: #eee;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .card-category {
            font-size: 12px;
            color: #888;
        }

        /* 悬浮提示词 */
        .card-tooltip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-height: 70%;
            overflow-y: auto;
        }

        .card:hover .card-tooltip {
            opacity: 1;
        }
    </style>
</head>

        // 自动生成分类按钮
        const nav = document.getElementById('nav');
        const grid = document.getElementById('grid');
        const categoryList = [...new Set(dataset.map(item => item.category))];

        // 渲染分类
        function renderNav() {
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn active';
            allBtn.textContent = '全部';
            allBtn.onclick = () => filter('all');
            nav.appendChild(allBtn);

            categoryList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = cat;
                btn.onclick = () => filter(cat);
                nav.appendChild(btn);
            });
        }

        // 筛选渲染
        function filter(cate) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            event?.target.classList.add('active');
            const data = cate === 'all' ? dataset : dataset.filter(i => i.category === cate);
            renderCards(data);
        }

        // 渲染卡片
        function renderCards(data) {
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="card-tooltip">${item.prompt}</div>
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category">${item.category}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 初始化
        renderNav();
        renderCards(dataset);
    </script>
