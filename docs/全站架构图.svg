<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="platform" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="gwapi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#fb923c"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1400" height="1040" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Site Architecture (Zero Bypass)</text>
  <text x="700" y="76" text-anchor="middle" fill="#94a3b8" font-size="14">private_website Monorepo / book-mall Platform Federation</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="620" y="100" width="160" height="56" rx="12" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
    <text x="700" y="134" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="600">User Browser</text>
  </g>

  <!-- Platform layer -->
  <rect x="80" y="200" width="1240" height="248" rx="16" fill="#0c4a6e22" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="100" y="228" fill="#7dd3fc" font-size="15" font-weight="700">Platform: book-mall :3000</text>
  <text x="100" y="248" fill="#94a3b8" font-size="12">book.ai-code8.com</text>

  <g filter="url(#shadow)">
    <rect x="360" y="262" width="480" height="72" rx="12" fill="url(#platform)"/>
    <text x="600" y="292" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">book-mall</text>
    <text x="600" y="314" text-anchor="middle" fill="#e0f2fe" font-size="12">NextAuth / Wallet / Credits / Platform API / Prisma</text>
    <text x="600" y="332" text-anchor="middle" fill="#bae6fd" font-size="11">/api/sso/tools/*  introspect  gateway proxy</text>
  </g>

  <!-- Gateway API boundary inside book-mall -->
  <g filter="url(#shadow)">
    <rect x="360" y="348" width="480" height="84" rx="12" fill="url(#gwapi)"/>
    <text x="600" y="376" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">/api/gw/v1/*  (Gateway API)</text>
    <text x="600" y="398" text-anchor="middle" fill="#ccfbf1" font-size="11">ONLY place that calls vendor HTTP (KIE / DashScope / Bailian / Volcengine / Hunyuan)</text>
    <text x="600" y="416" text-anchor="middle" fill="#99f6e4" font-size="10">Auth: Gateway-Internal secret + User.gatewayApiKeyId</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="220" cy="330" rx="88" ry="44" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="220" y="326" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="600">PostgreSQL</text>
    <text x="220" y="344" text-anchor="middle" fill="#93c5fd" font-size="11">Prisma ORM</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="980" cy="330" rx="88" ry="44" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="980" y="326" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="600">Aliyun OSS</text>
    <text x="980" y="344" text-anchor="middle" fill="#93c5fd" font-size="11">Media storage</text>
  </g>

  <line x1="308" y1="330" x2="360" y2="298" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="840" y1="298" x2="892" y2="330" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Tool subsites -->
  <rect x="80" y="480" width="1240" height="300" rx="16" fill="#1c191722" stroke="#fb923c" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="100" y="508" fill="#fdba74" font-size="15" font-weight="700">Tool Apps (separate CloudBase services)</text>

  <g filter="url(#shadow)">
    <rect x="110" y="530" width="170" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="195" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">tool-web</text>
    <text x="195" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3001 shi-yi / sheng-tu</text>
    <text x="195" y="594" text-anchor="middle" fill="#78716c" font-size="10">tool.ai-code8.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="530" width="170" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="385" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">finance-web</text>
    <text x="385" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3002 zhang-dan</text>
    <text x="385" y="594" text-anchor="middle" fill="#78716c" font-size="10">f.ai-code8.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="490" y="530" width="170" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="575" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">story-web</text>
    <text x="575" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3003 man-ju</text>
    <text x="575" y="594" text-anchor="middle" fill="#78716c" font-size="10">story.ai-code8.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="680" y="530" width="170" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="765" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">canvas-web</text>
    <text x="765" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3004 hai-bao</text>
    <text x="765" y="594" text-anchor="middle" fill="#78716c" font-size="10">canvas.ai-code8.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="870" y="530" width="200" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="970" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">prompt-optimizer</text>
    <text x="970" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3006 ti-shi-ci</text>
    <text x="970" y="594" text-anchor="middle" fill="#78716c" font-size="10">prompt.ai-code8.com</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1090" y="530" width="200" height="72" rx="10" fill="#292524" stroke="#78716c"/>
    <text x="1190" y="558" text-anchor="middle" fill="#fafaf9" font-size="13" font-weight="600">e-commerce-toolkit</text>
    <text x="1190" y="578" text-anchor="middle" fill="#a8a29e" font-size="11">:3007 dian-shang gong-ju</text>
    <text x="1190" y="594" text-anchor="middle" fill="#78716c" font-size="10">ecom.ai-code8.com</text>
  </g>

  <!-- gateway-web console -->
  <g filter="url(#shadow)">
    <rect x="490" y="630" width="420" height="88" rx="12" fill="url(#accent)"/>
    <text x="700" y="662" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">gateway-web :3005</text>
    <text x="700" y="686" text-anchor="middle" fill="#ffedd5" font-size="12">BYOK Console: vendor credentials / model catalog / sk-gw keys / logs UI</text>
    <text x="700" y="706" text-anchor="middle" fill="#fed7aa" font-size="11">gateway.ai-code8.com (UI + external sk-gw API, NOT sub-app vendor path)</text>
  </g>

  <!-- Vendor APIs -->
  <g filter="url(#shadow)">
    <rect x="1020" y="340" width="280" height="88" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
    <text x="1160" y="372" text-anchor="middle" fill="#dcfce7" font-size="14" font-weight="600">Vendor APIs</text>
    <text x="1160" y="394" text-anchor="middle" fill="#86efac" font-size="11">Bailian / DashScope / KIE / Volcengine</text>
    <text x="1160" y="412" text-anchor="middle" fill="#86efac" font-size="11">DeepSeek / Hunyuan</text>
  </g>

  <!-- Async workers -->
  <rect x="80" y="810" width="1240" height="100" rx="16" fill="#312e8122" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="100" y="838" fill="#c4b5fd" font-size="15" font-weight="700">Async / Background</text>
  <g filter="url(#shadow)">
    <rect x="200" y="850" width="360" height="44" rx="10" fill="#3730a3"/>
    <text x="380" y="877" text-anchor="middle" fill="#e0e7ff" font-size="12">Prod: Tencent SCF gateway-poll</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="600" y="850" width="360" height="44" rx="10" fill="#3730a3"/>
    <text x="780" y="877" text-anchor="middle" fill="#e0e7ff" font-size="12">Local: gateway-poll-loop (dev:all)</text>
  </g>

  <!-- User to platform -->
  <line x1="700" y1="156" x2="600" y2="262" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="156" x2="700" y2="530" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="710" y="360" fill="#64748b" font-size="10">browse apps</text>

  <!-- Sub-apps to book-mall -->
  <path d="M195 530 L195 460 L600 334" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M575 530 L575 460 L620 334" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M765 530 L765 460 L640 334" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M970 530 L970 460 L660 334" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M1190 530 L1190 450 L720 334" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="130" y="495" fill="#7dd3fc" font-size="11">Book SSO tools_token</text>
  <text x="130" y="510" fill="#7dd3fc" font-size="11">/api/sso/tools/gateway/*</text>

  <!-- finance to book -->
  <path d="M385 530 L385 400 L560 320" fill="none" stroke="#a8a29e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="420" fill="#a8a29e" font-size="10">billing API</text>

  <!-- gw/v1 to vendor (zero bypass) -->
  <line x1="840" y1="390" x2="1020" y2="390" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="860" y="378" fill="#86efac" font-size="10" font-weight="600">BYOK vendor creds</text>
  <text x="860" y="408" fill="#86efac" font-size="9">no business-layer bypass</text>

  <!-- Business clients internal loop (conceptual) -->
  <path d="M600 334 L600 262" fill="none" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <text x="610" y="252" fill="#5eead4" font-size="9">*-gateway-client</text>

  <!-- gateway-web SSO (credential mgmt only) -->
  <path d="M490 670 L360 670 L360 390 L360 348" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 3"/>
  <path d="M360 348 L360 320 L490 298" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>
  <text x="280" y="660" fill="#fdba74" font-size="10">Gateway SSO</text>
  <text x="280" y="674" fill="#fdba74" font-size="9">manage sk-gw + creds</text>

  <!-- sk-gw link -->
  <rect x="80" y="730" width="400" height="56" rx="10" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="100" y="754" fill="#fdba74" font-size="12" font-weight="600">One sk-gw per Book user</text>
  <text x="100" y="772" fill="#fed7aa" font-size="10">User links sk-gw in Book account; sub-apps never hold vendor keys</text>

  <!-- Poll workers to gw/v1 -->
  <path d="M380 850 L380 800 L600 432" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowPurple)"/>
  <path d="M780 850 L780 800 L640 432" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowPurple)"/>
  <text x="820" y="820" fill="#c4b5fd" font-size="10">POST /api/gw/v1/jobs/recordInfo</text>

  <!-- Legend -->
  <rect x="80" y="940" width="1240" height="76" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="100" y="964" fill="#94a3b8" font-size="12" font-weight="600">Legend:</text>
  <line x1="160" y1="970" x2="200" y2="970" stroke="#38bdf8" stroke-width="2"/>
  <text x="210" y="974" fill="#cbd5e1" font-size="11">SSO / Platform API</text>
  <line x1="360" y1="970" x2="400" y2="970" stroke="#2dd4bf" stroke-width="2"/>
  <text x="410" y="974" fill="#cbd5e1" font-size="11">gateway-v1-http-client</text>
  <line x1="580" y1="970" x2="620" y2="970" stroke="#4ade80" stroke-width="2"/>
  <text x="630" y="974" fill="#cbd5e1" font-size="11">Vendor HTTP (gw/v1 only)</text>
  <line x1="820" y1="970" x2="860" y2="970" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="870" y="974" fill="#cbd5e1" font-size="11">sk-gw console</text>
  <line x1="1000" y1="970" x2="1040" y2="970" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="1050" y="974" fill="#cbd5e1" font-size="11">async poll</text>
  <text x="100" y="998" fill="#64748b" font-size="10">All AI generation: sub-app -&gt; book-mall Platform API -&gt; /api/gw/v1 -&gt; vendor. No direct vendor calls in business code.</text>
</svg>
