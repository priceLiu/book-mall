# 腾讯云 PostgreSQL · PgBouncer 连接池配置(transaction 模式)
# 部署:与 CDB 同 VPC 的 CVM/TKE;应用 DATABASE_URL 指向本实例 :6432(带 pgbouncer=true)。
# 迁移(prisma db:deploy)走 DIRECT_DATABASE_URL 直连 CDB:24155,不经本池。

[databases]
# 名称须与应用连接串里的 dbname 一致(tool_mall)。host/port 指向真实 CDB。
tool_mall = host=sh-postgres-i556nz8q.sql.tencentcdb.com port=24155 dbname=tool_mall

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

# —— 认证 ——
# md5:在 userlist.txt 写 "user" "md5<hash>"(hash=md5(password+username))。
# 生产更推荐 auth_query(不落地口令哈希),见 README。
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# —— 池模式:Prisma 兼容必须 transaction ——
pool_mode = transaction

# 与腾讯云 CDB 当前 sslmode=disable 对齐;生产若 CDB 强制 TLS 改为 prefer/require。
server_tls_sslmode = disable

# —— 连接预算(示例 CDB max_connections=100;按 README 连接预算表调) ——
max_client_conn = 200
default_pool_size = 50
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

# —— 关键:主动回收空闲 server 连接,早于腾讯云直连对空闲 TCP 的回收窗口 ——
# 这正是消除 "Server has closed the connection" / 直连空闲被回收 的根因处理。
# 本地 dev 经公网 + NAT,空闲 TCP 回收窗口比同 VPC 更短(实测 120 仍出现
# "server conn crashed?"),故降到 30;并用 server_check_delay 在复用前校验(SELECT 1),
# 即使个别连接已被远端/ NAT 掐断也会被换掉而非把死连接交给客户端。
server_idle_timeout = 30
# 关键:本地 dev 经公网/NAT,实测 server 连接被链路在 ~60s 硬切(日志里 server conn
# crashed? age≈60-66s 高度一致)。server_lifetime 必须 < 该窗口,让 PgBouncer 在被
# 链路掐断前主动回收每条连接,否则会反复把 60s 的死连接交给客户端。同 VPC 生产无此切断,
# 可按需调大;45 在两种环境都安全(仅增加少量重连)。
server_lifetime = 45
server_reset_query = DISCARD ALL
# 复用前若连接空闲超过该秒数,先跑 server_check_query(默认 SELECT 1)探活,失败则丢弃换新。
server_check_delay = 5
# transaction 模式下 server_reset_query 仅在 server_reset_query_always=0 时按需触发,保持默认。

# —— Prisma 启动参数兼容(否则握手报 unsupported startup parameter) ——
ignore_startup_parameters = extra_float_digits,options,search_path

# —— TCP keepalive:链路探活,配合 server_idle_timeout 双保险 ——
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3

# —— 可观测 ——
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

# 管理/统计账号(SHOW POOLS / SHOW STATS),在 userlist.txt 一并登记。
admin_users = pgbouncer_admin
stats_users = pgbouncer_stat
